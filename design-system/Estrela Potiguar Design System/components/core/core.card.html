<!-- @dsCard group="Components" viewport="700x560" name="Core — buttons, inputs, chips, feedback" subtitle="Button · IconButton · Input · Tag · Badge · Switch · Tabs · Rating · Avatar" -->
<!doctype html>
<html data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-base);font-family:var(--font-body)}
  .grid{display:flex;flex-direction:column;gap:22px}
  .row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .lab{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin:0 0 10px}
  .block{padding-bottom:18px;border-bottom:1px solid var(--border-subtle)}
  .block:last-child{border-bottom:0;padding-bottom:0}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Button, IconButton, Input, Tag, Badge, Switch, Tabs, Rating, Avatar } = window.EstrelaPotiguarDesignSystem_69a35c;

const Ico = ({d, fill='none'}) => <svg width="18" height="18" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
const Search = <Ico d={<><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></>} />;
const Plus = <Ico d={<><path d="M12 5v14M5 12h14"/></>} />;
const Locate = <Ico d={<><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></>} />;
const Waves = <Ico d={<path d="M2 8c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2M2 16c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2"/>} />;

function Demo(){
  const [tab,setTab]=React.useState('sobre');
  const [on,setOn]=React.useState(true);
  const [sel,setSel]=React.useState('praias');
  return (
    <div className="grid">
      <div className="block">
        <p className="lab">Button — variants</p>
        <div className="row">
          <Button variant="primary">Salvar roteiro</Button>
          <Button variant="aurora" leadingIcon={<span>★</span>}>Destaque</Button>
          <Button variant="secondary">Cancelar</Button>
          <Button variant="ghost">Ver mais</Button>
          <Button variant="subtle">Filtros</Button>
          <Button variant="primary" disabled>Indisponível</Button>
        </div>
        <div className="row" style={{marginTop:12}}>
          <Button size="sm">Pequeno</Button>
          <Button size="md">Médio</Button>
          <Button size="lg">Grande</Button>
          <Button loading>Salvando</Button>
        </div>
      </div>

      <div className="block">
        <p className="lab">IconButton</p>
        <div className="row">
          <IconButton label="Aproximar" variant="floating">{Plus}</IconButton>
          <IconButton label="Localizar" variant="solid">{Locate}</IconButton>
          <IconButton label="Buscar" variant="ghost">{Search}</IconButton>
          <IconButton label="Ativo" variant="ghost" active>{Waves}</IconButton>
          <IconButton label="Acento" variant="accent">{Plus}</IconButton>
        </div>
      </div>

      <div className="block">
        <p className="lab">Input</p>
        <div style={{maxWidth:380}}>
          <Input placeholder="Buscar praias, fortes, dunas…" leadingIcon={Search} />
        </div>
      </div>

      <div className="block">
        <p className="lab">Tag — filtros de categoria</p>
        <div className="row">
          <Tag icon={Waves} selected={sel==='praias'} onClick={()=>setSel('praias')}>Praias</Tag>
          <Tag selected={sel==='fortes'} color="var(--aurora)" onClick={()=>setSel('fortes')}>Fortes</Tag>
          <Tag selected={sel==='dunas'} onClick={()=>setSel('dunas')}>Dunas</Tag>
          <Tag selected={sel==='natureza'} color="var(--mare)" onClick={()=>setSel('natureza')}>Natureza</Tag>
        </div>
      </div>

      <div className="block">
        <p className="lab">Badge</p>
        <div className="row">
          <Badge tone="success" dot>Aberto agora</Badge>
          <Badge tone="danger" dot>Fechado</Badge>
          <Badge tone="star">Top 10</Badge>
          <Badge tone="aurora" solid>Destaque</Badge>
          <Badge tone="mare">Trilha</Badge>
          <Badge tone="info">Maré baixa</Badge>
        </div>
      </div>

      <div className="block">
        <p className="lab">Switch · Rating · Avatar</p>
        <div className="row" style={{gap:24}}>
          <Switch checked={on} onChange={setOn} label="Só abertos" />
          <Rating value={4.8} count={1240} showValue />
          <div className="row" style={{gap:6}}>
            <Avatar name="Ana Lima" ring />
            <Avatar name="João Souza" />
          </div>
        </div>
      </div>

      <div className="block">
        <p className="lab">Tabs</p>
        <Tabs value={tab} onChange={setTab} items={[
          {value:'sobre',label:'Sobre'},
          {value:'fotos',label:'Fotos',count:24},
          {value:'avaliacoes',label:'Avaliações',count:1240},
          {value:'mapa',label:'No mapa'},
        ]} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
