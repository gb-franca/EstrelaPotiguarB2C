<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:26px 28px;background:var(--surface-base);font-family:var(--font-body)}
  .eyebrow{margin-bottom:10px}
  .tag{font-family:var(--font-display);font-weight:700;font-size:30px;line-height:1.12;color:var(--text-primary);margin:0;letter-spacing:-.02em}

</style></head><body>
  <span class="ep-eyebrow eyebrow">Guia de viagem · RN</span>
  <p class="tag">Cada atração é uma <b>estrela</b>.<br>Monte o seu céu.</p>
  <p class="sub">Convidativo, próximo e orgulhoso do lugar. Falamos com você (segunda pessoa), com calor potiguar — nunca corporativo.</p>
  <p class="quote ep-italic">“onde o sertão encontra o mar”</p>
