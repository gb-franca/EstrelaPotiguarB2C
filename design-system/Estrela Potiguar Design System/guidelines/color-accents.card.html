<!-- @dsCard group="Colors" viewport="700x200" name="Brand accents — Aurora & Maré" subtitle="Magenta for featured · lime for nature & trails" -->
<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--surface-base);font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .lab{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-secondary);margin:0 0 8px}
  .row{display:flex;gap:8px}
  .sw{flex:1;border-radius:var(--radius-md);height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px;border:1px solid var(--border-subtle)}
  .n{font-size:11px;font-weight:600}
  .h{font-size:10px;opacity:.7;font-variant-numeric:tabular-nums}
</style></head><body>
  <div class="grid">
    <div>
      <p class="lab">Aurora · featured</p>
      <div class="row">
        <div class="sw" style="background:var(--ep-aurora-300);color:#100f46"><span class="n">300</span><span class="h">#fa9af4</span></div>
        <div class="sw" style="background:var(--ep-aurora-400);color:#fff;box-shadow:var(--glow-aurora)"><span class="n">400 ★</span><span class="h">#f637ec</span></div>
        <div class="sw" style="background:var(--ep-aurora-500);color:#fff"><span class="n">500</span><span class="h">#c819c0</span></div>
      </div>
    </div>
    <div>
      <p class="lab">Maré · nature</p>
      <div class="row">
        <div class="sw" style="background:var(--ep-mare-300);color:#100f46"><span class="n">300</span><span class="h">#c2f07e</span></div>
        <div class="sw" style="background:var(--ep-mare-400);color:#100f46"><span class="n">400 ★</span><span class="h">#96df29</span></div>
        <div class="sw" style="background:var(--ep-mare-500);color:#fff"><span class="n">500</span><span class="h">#74b417</span></div>
      </div>
    </div>
  </div>
</body></html>
