<!-- @dsCard group="Type" viewport="700x230" name="Font families" subtitle="Noto Serif display · Roboto body · Roboto variable-italic" -->
<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-base);font-family:var(--font-body)}
  .item{padding:12px 0;border-bottom:1px solid var(--border-subtle)}
  .item:last-child{border-bottom:0}
  .lab{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
  .spec{color:var(--text-primary)}
</style></head><body>
  <div class="item">
    <div class="lab">Display — var(--font-display) · Noto Serif</div>
    <div class="spec" style="font-family:var(--font-display);font-size:32px;font-weight:700">Estrela Potiguar</div>
  </div>
  <div class="item">
    <div class="lab">Body / UI — var(--font-body) · Roboto</div>
    <div class="spec" style="font-size:18px">Descubra as estrelas do céu potiguar — praias, fortes e dunas.</div>
  </div>
  <div class="item">
    <div class="lab">Editorial italic — var(--font-italic) · Roboto VF italic</div>
    <div class="spec ep-italic" style="font-size:18px">“onde o sertão encontra o mar”</div>
  </div>
</body></html>
