<!-- @dsCard group="Colors" viewport="700x190" name="Star — highlight yellow" subtitle="The glow: pins, primary accent, focus" -->
<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--surface-base);font-family:var(--font-body)}
  .row{display:flex;gap:10px}
  .sw{flex:1;border-radius:var(--radius-md);height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;border:1px solid var(--border-subtle)}
  .n{font-size:11px;font-weight:600;color:#100f46}
  .h{font-size:10px;color:#100f46;opacity:.6;font-variant-numeric:tabular-nums}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:var(--ep-star-100)"><span class="n">100</span><span class="h">#fffbe3</span></div>
    <div class="sw" style="background:var(--ep-star-200)"><span class="n">200</span><span class="h">#fff3a8</span></div>
    <div class="sw" style="background:var(--ep-star-300)"><span class="n">300</span><span class="h">#fbe96b</span></div>
    <div class="sw" style="background:var(--ep-star-400);box-shadow:var(--glow-md)"><span class="n">400 ★</span><span class="h">#f8de22</span></div>
    <div class="sw" style="background:var(--ep-star-500)"><span class="n">500</span><span class="h">#e6c70f</span></div>
    <div class="sw" style="background:var(--ep-star-600)"><span class="n" style="color:#fffbe3">600</span><span class="h" style="color:#fffbe3">#bfa406</span></div>
  </div>
</body></html>
