<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-base);font-family:var(--font-body)}
  .row{display:flex;align-items:flex-end;gap:14px}
  .c{display:flex;flex-direction:column;align-items:center;gap:7px}
  .b{background:var(--accent);border-radius:3px;width:22px}
  .l{font-size:10px;color:var(--text-muted)}
</style></head><body>
  <div class="row">
    <div class="c"><div class="b" style="height:var(--space-1)"></div><span class="l">1·4</span></div>
    <div class="c"><div class="b" style="height:var(--space-2)"></div><span class="l">2·8</span></div>
    <div class="c"><div class="b" style="height:var(--space-3)"></div><span class="l">3·12</span></div>
    <div class="c"><div class="b" style="height:var(--space-4)"></div><span class="l">4·16</span></div>
    <div class="c"><div class="b" style="height:var(--space-5)"></div><span class="l">5·24</span></div>
    <div class="c"><div class="b" style="height:var(--space-6)"></div><span class="l">6·32</span></div>
    <div class="c"><div class="b" style="height:var(--space-7)"></div><span class="l">7·40</span></div>
    <div class="c"><div class="b" style="height:var(--space-8)"></div><span class="l">8·48</span></div>
    <div class="c"><div class="b" style="height:var(--space-9)"></div><span class="l">9·64</span></div>
  </div>
</body></html>
