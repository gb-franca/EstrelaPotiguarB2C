<!-- @dsCard group="Spacing" viewport="700x210" name="Elevation" subtitle="Deep cool night shadows, sm → xl" -->
<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:30px 24px;background:var(--surface-base);font-family:var(--font-body)}
  .row{display:flex;gap:26px;align-items:center;justify-content:space-between}
  .c{display:flex;flex-direction:column;align-items:center;gap:12px}
  .b{width:96px;height:66px;background:var(--surface-card);border-radius:var(--radius-md);border:1px solid var(--border-subtle)}
  .l{font-size:10px;color:var(--text-muted)}
</style></head><body>
  <div class="row">
    <div class="c"><div class="b" style="box-shadow:var(--shadow-sm)"></div><span class="l">shadow-sm</span></div>
    <div class="c"><div class="b" style="box-shadow:var(--shadow-md)"></div><span class="l">shadow-md</span></div>
    <div class="c"><div class="b" style="box-shadow:var(--shadow-lg)"></div><span class="l">shadow-lg</span></div>
    <div class="c"><div class="b" style="box-shadow:var(--shadow-xl)"></div><span class="l">shadow-xl</span></div>
    <div class="c"><div class="b" style="box-shadow:var(--shadow-float)"></div><span class="l">shadow-float</span></div>
  </div>
</body></html>
