<!-- @dsCard group="Colors" viewport="700x190" name="Sand — warm light" subtitle="Cream surfaces in light mode; text on night" -->
<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--surface-base);font-family:var(--font-body)}
  .row{display:flex;gap:10px}
  .sw{flex:1;border-radius:var(--radius-md);height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;border:1px solid var(--border-subtle)}
  .n{font-size:11px;font-weight:600;color:#100f46}
  .h{font-size:10px;color:#100f46;opacity:.6;font-variant-numeric:tabular-nums}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:var(--ep-sand-50)"><span class="n">50</span><span class="h">#faf6ef</span></div>
    <div class="sw" style="background:var(--ep-sand-100)"><span class="n">100</span><span class="h">#f3ecdf</span></div>
    <div class="sw" style="background:var(--ep-sand-200)"><span class="n">200 ★</span><span class="h">#e9e0d2</span></div>
    <div class="sw" style="background:var(--ep-sand-300)"><span class="n">300</span><span class="h">#d6c9b4</span></div>
    <div class="sw" style="background:var(--ep-sand-400)"><span class="n">400</span><span class="h">#b8a987</span></div>
    <div class="sw" style="background:var(--ep-sand-500)"><span class="n" style="color:#faf6ef">500</span><span class="h" style="color:#faf6ef">#8f8062</span></div>
  </div>
</body></html>
