<!-- @dsCard group="Colors" viewport="700x180" name="Semantic signals" subtitle="success · warning · danger · info, with soft fills" -->
<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--surface-base);font-family:var(--font-body)}
  .row{display:flex;gap:12px}
  .cell{flex:1}
  .bar{height:54px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px}
  .soft{height:30px;border-radius:var(--radius-sm);margin-top:6px;border:1px solid var(--border-subtle);display:flex;align-items:center;padding-left:10px;font-size:11px;color:var(--text-secondary)}
  .lab{font-size:11px;color:var(--text-muted);margin-top:7px;text-align:center}
</style></head><body>
  <div class="row">
    <div class="cell"><div class="bar" style="background:var(--success);color:#0a0930">Maré aberta</div><div class="soft" style="background:var(--success-soft)">--success-soft</div><div class="lab">--success</div></div>
    <div class="cell"><div class="bar" style="background:var(--warning);color:#100f46">Atenção</div><div class="soft" style="background:var(--warning-soft)">--warning-soft</div><div class="lab">--warning</div></div>
    <div class="cell"><div class="bar" style="background:var(--danger);color:#fff">Fechado</div><div class="soft" style="background:var(--danger-soft)">--danger-soft</div><div class="lab">--danger</div></div>
    <div class="cell"><div class="bar" style="background:var(--info);color:#06121c">Maré info</div><div class="soft" style="background:var(--info-soft)">--info-soft</div><div class="lab">--info</div></div>
  </div>
</body></html>
