<!-- @dsCard group="Spacing" viewport="700x180" name="Corner radii" subtitle="Soft pebble corners; chips & pins go full" -->
<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-base);font-family:var(--font-body)}
  .row{display:flex;gap:16px;align-items:flex-end}
  .c{display:flex;flex-direction:column;align-items:center;gap:8px}
  .b{width:74px;height:74px;background:var(--surface-card);border:1px solid var(--border-default);border-bottom:3px solid var(--accent)}
  .l{font-size:10px;color:var(--text-muted)}
</style></head><body>
  <div class="row">
    <div class="c"><div class="b" style="border-radius:var(--radius-xs)"></div><span class="l">xs · 4</span></div>
    <div class="c"><div class="b" style="border-radius:var(--radius-sm)"></div><span class="l">sm · 8</span></div>
    <div class="c"><div class="b" style="border-radius:var(--radius-md)"></div><span class="l">md · 12</span></div>
    <div class="c"><div class="b" style="border-radius:var(--radius-lg)"></div><span class="l">lg · 18</span></div>
    <div class="c"><div class="b" style="border-radius:var(--radius-xl)"></div><span class="l">xl · 26</span></div>
    <div class="c"><div class="b" style="border-radius:var(--radius-2xl)"></div><span class="l">2xl · 36</span></div>
    <div class="c"><div class="b" style="border-radius:var(--radius-full)"></div><span class="l">full</span></div>
  </div>
</body></html>
