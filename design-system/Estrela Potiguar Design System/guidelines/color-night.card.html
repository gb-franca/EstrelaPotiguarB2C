<!-- @dsCard group="Colors" viewport="700x190" name="Night — sky canvas" subtitle="Deep indigo ramp; the base of every dark surface" -->
<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--surface-base);font-family:var(--font-body)}
  .row{display:flex;gap:10px}
  .sw{flex:1;border-radius:var(--radius-md);height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;border:1px solid var(--border-subtle)}
  .n{font-size:11px;font-weight:600;color:#fff;opacity:.92}
  .h{font-size:10px;color:#fff;opacity:.6;font-variant-numeric:tabular-nums}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:var(--ep-night-950)"><span class="n">950</span><span class="h">#07061d</span></div>
    <div class="sw" style="background:var(--ep-night-900)"><span class="n">900</span><span class="h">#0a0930</span></div>
    <div class="sw" style="background:var(--ep-night-700)"><span class="n">700 ★</span><span class="h">#100f46</span></div>
    <div class="sw" style="background:var(--ep-night-600)"><span class="n">600</span><span class="h">#191760</span></div>
    <div class="sw" style="background:var(--ep-night-500)"><span class="n">500</span><span class="h">#252178</span></div>
    <div class="sw" style="background:var(--ep-night-400)"><span class="n">400</span><span class="h">#383293</span></div>
    <div class="sw" style="background:var(--ep-night-300)"><span class="n">300</span><span class="h">#534caf</span></div>
  </div>
</body></html>
