<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Itinerary background export</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; }
    .page {
      position: relative;
      width: 1920px;
      height: 1080px;
      background-color: #0a0930; /* --surface-base / --ep-night-900 */
    }
    .ep-starfield {
      position: absolute;
      inset: 0;
      opacity: 0.4;
      background-color: #060a24; /* --map-canvas */
      background-image:
        radial-gradient(1.4px 1.4px at 12% 22%, rgba(255, 251, 227, 0.9), transparent 60%),
        radial-gradient(1.2px 1.2px at 78% 16%, rgba(255, 251, 227, 0.8), transparent 60%),
        radial-gradient(1.6px 1.6px at 34% 64%, rgba(248, 222, 34, 0.9), transparent 60%),
        radial-gradient(1px 1px at 62% 48%, rgba(255, 251, 227, 0.7), transparent 60%),
        radial-gradient(1.3px 1.3px at 88% 72%, rgba(255, 251, 227, 0.8), transparent 60%),
        radial-gradient(1px 1px at 22% 84%, rgba(255, 251, 227, 0.6), transparent 60%),
        radial-gradient(1.1px 1.1px at 52% 12%, rgba(255, 251, 227, 0.7), transparent 60%),
        radial-gradient(1.5px 1.5px at 8% 56%, rgba(250, 154, 244, 0.7), transparent 60%);
      background-repeat: repeat;
      background-size: 320px 320px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="ep-starfield" aria-hidden="true"></div>
  </div>
</body>
</html>
